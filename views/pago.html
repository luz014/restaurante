<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago</title>

    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <h1>💳 Pago</h1>
    </header>

    <main class="container">

        <!-- RESUMEN -->
        <section class="resumen">
            <h2>Resumen</h2>

            <ul id="lista-pedido"></ul>

            <p>Subtotal: $<span id="subtotal">0</span></p>

            <label>
                Propina (%):
                <input type="number" id="propina" value="10" min="0">
            </label>

            <p>Total con propina: $<span id="total">0</span></p>
        </section>

        <!-- MÉTODO DE PAGO -->
        <section class="pago">
            <h2>Método de pago</h2>

            <select id="metodo-pago">
                <option value="">Seleccionar</option>
                <option value="efectivo">Efectivo</option>
                <option value="tarjeta">Tarjeta</option>
                <option value="yappi">Yappi</option>
            </select>
        </section>

        <button id="btn-finalizar">Finalizar y generar factura</button>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module" src="../assets/js/modules/pagos.js"></script>
</body>
</html>
